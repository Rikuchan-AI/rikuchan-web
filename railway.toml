[build]
builder = "RAILPACK"
buildCommand = "npm run build"
watchPatterns = ["app/**", "components/**", "hooks/**", "lib/**", "content/**", "package.json", "next.config.ts", "tailwind.config.*"]

[deploy]
startCommand = "npm run start"
healthcheckPath = "/"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
drainingSeconds = "15"
overlapSeconds = "10"
